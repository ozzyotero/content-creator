services:
  - type: web
    name: linkedin-ai-content-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2
      - key: DATABASE_URL
        value: sqlite:///data/content_agent.db
      - key: EMAIL_PROVIDER
        value: smtp
      - key: EMAIL_PROVIDER_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WEEKLY_REPORT_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: LINKEDIN_MOCK_MODE
        value: "true"
      - key: APP_TIMEZONE
        value: America/New_York
